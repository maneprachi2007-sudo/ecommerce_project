{% extends 'layout.html' %}

{% block content %}

<h2>My Orders</h2>

<table class="table table-bordered">

    <tr>
        <th>Order ID</th>
        <th>Total Amount</th>
        <th>Order Date</th>
    </tr>

    {% for order in orders %}

    <tr>
        <td>{{ order[0] }}</td>
        <td>₹ {{ order[2] }}</td>
        <td>{{ order[3] }}</td>
    </tr>

    {% endfor %}

</table>

{% endblock %}
