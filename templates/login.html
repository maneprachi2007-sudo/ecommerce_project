<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <h2>Login</h2>

            <form method="POST">

                <input
                    type="email"
                    name="email"
                    class="form-control mb-3"
                    placeholder="Email">

                <input
                    type="password"
                    name="password"
                    class="form-control mb-3"
                    placeholder="Password">

                <button
                    class="btn btn-primary w-100">
                    Login
                </button>

            </form>

            <a href="/register">
                Create Account
            </a>

        </div>

    </div>

</div>

</body>
</html>
