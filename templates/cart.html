{% extends 'layout.html' %}

{% block content %}

<h2>Shopping Cart</h2>

<table class="table table-bordered">

    <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
    </tr>

    {% for item in cart_items %}

    <tr>
        <td>{{ item[5] }}</td>
        <td>₹ {{ item[7] }}</td>
        <td>{{ item[3] }}</td>
    </tr>

    {% endfor %}

</table>

<a href="/place_order" class="btn btn-primary">
    Place Order
</a>

{% endblock %}
