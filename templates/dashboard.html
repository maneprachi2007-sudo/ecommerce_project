{% extends 'layout.html' %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">Admin Dashboard</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="card text-center p-4">
                <h4>Total Users</h4>
                <h1>{{ users }}</h1>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center p-4">
                <h4>Total Products</h4>
                <h1>{{ products }}</h1>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center p-4">
                <h4>Total Orders</h4>
                <h1>{{ orders }}</h1>
            </div>
        </div>

    </div>

</div>

{% endblock %}
